<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntfy.sh Logs — Woot! Alert Bot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0b14;
            --bg-secondary: #12131f;
            --bg-card: #181a2a;
            --bg-card-hover: #1e2035;
            --border: rgba(255,255,255,0.06);
            --border-active: rgba(99,102,241,0.4);
            --text-primary: #f0f0f5;
            --text-secondary: #9ca3af;
            --text-muted: #8b929e;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99,102,241,0.25);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .bg-gradient {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.12), transparent),
                        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(236,72,153,0.06), transparent);
            pointer-events: none; z-index: 0;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none; z-index: 0;
        }
        .wrapper {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto;
            padding: 24px 24px 40px;
        }

        /* Header */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: var(--radius); display: flex;
            align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .header-title h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
        .header-title h1 span {
            background: linear-gradient(135deg, var(--accent-light), #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-title p { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 18px; border-radius: var(--radius-sm);
            border: none; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all var(--transition);
            font-family: inherit; text-decoration: none;
        }
        .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--border-active); color: var(--text-primary); }
        .btn-danger { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
        .btn-danger:hover { background: rgba(239,68,68,0.2); }

        /* Stats */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .stat-box {
            padding: 16px 18px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius);
            display: flex; align-items: center; gap: 12px;
        }
        .stat-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .stat-icon.total { background: rgba(99,102,241,0.12); }
        .stat-icon.ok { background: rgba(16,185,129,0.12); }
        .stat-icon.fail { background: rgba(239,68,68,0.12); }
        .stat-value {
            font-size: 1.3rem; font-weight: 800;
            font-family: 'JetBrains Mono', monospace; display: block;
        }
        .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Filter */
        .filter-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-chip {
            padding: 6px 14px; border-radius: 999px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-muted); font-size: 0.78rem; font-weight: 500;
            cursor: pointer; transition: all var(--transition);
            font-family: inherit;
        }
        .filter-chip:hover { border-color: var(--accent); color: var(--text-primary); }
        .filter-chip.active { background: rgba(99,102,241,0.15); border-color: var(--accent); color: var(--accent-light); }

        /* Table */
        .log-table-wrap {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            text-align: left; padding: 12px 16px;
            font-size: 0.72rem; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
            background: var(--bg-secondary); position: sticky; top: 0;
        }
        tbody tr { transition: background var(--transition); }
        tbody tr:hover { background: var(--bg-card-hover); }
        tbody td {
            padding: 12px 16px; font-size: 0.82rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 999px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        }
        .status-badge.success { background: rgba(16,185,129,0.15); color: var(--success); }
        .status-badge.error { background: rgba(239,68,68,0.15); color: var(--danger); }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }
        .text-muted { color: var(--text-muted); }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .deal-link { color: var(--accent-light); text-decoration: none; }
        .deal-link:hover { text-decoration: underline; }
        .discount-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700;
        }
        .discount-badge.hot { background: rgba(239,68,68,0.15); color: var(--danger); }
        .discount-badge.good { background: rgba(16,185,129,0.15); color: var(--success); }
        .discount-badge.none { background: rgba(255,255,255,0.06); color: var(--text-muted); }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-muted);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        .empty-state h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 6px; }

        .error-cell { font-size: 0.72rem; color: var(--danger); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Responsive */
        @media(max-width:768px) {
            .wrapper { padding: 12px 16px 40px; }
            thead th, tbody td { padding: 10px 12px; font-size: 0.75rem; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <div class="wrapper">
        <div class="page-header">
            <div class="header-left">
                <div class="header-icon">📡</div>
                <div class="header-title">
                    <h1>ntfy.sh <span>Logs</span></h1>
                    <p>Notification delivery history</p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-danger" id="btn-clear" title="Clear all logs">🗑️ Clear</button>
                <a href="/" class="btn btn-secondary">← Dashboard</a>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-icon total">📨</div>
                <div><span class="stat-value" id="stat-total">0</span><span class="stat-label">Total Sent</span></div>
            </div>
            <div class="stat-box">
                <div class="stat-icon ok">✅</div>
                <div><span class="stat-value text-success" id="stat-ok">0</span><span class="stat-label">Delivered</span></div>
            </div>
            <div class="stat-box">
                <div class="stat-icon fail">❌</div>
                <div><span class="stat-value text-danger" id="stat-fail">0</span><span class="stat-label">Failed</span></div>
            </div>
        </div>

        <div class="filter-row">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="success">✅ Success</button>
            <button class="filter-chip" data-filter="error">❌ Failed</button>
        </div>

        <div class="log-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Deal</th>
                        <th class="hide-mobile">Price</th>
                        <th>Discount</th>
                        <th>Status</th>
                        <th class="hide-mobile">Detail</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <tr><td colspan="6"><div class="empty-state"><div class="icon">📋</div><h3>Loading logs...</h3></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allLogs = [];
        let currentFilter = 'all';

        async function loadLogs() {
            try {
                const res = await fetch('/api/ntfy-logs');
                if (res.ok) {
                    allLogs = await res.json();
                    renderLogs();
                    updateStats();
                } else if (res.status === 401) {
                    window.location.href = '/login';
                }
            } catch (e) {
                document.getElementById('log-body').innerHTML =
                    '<tr><td colspan="6"><div class="empty-state"><div class="icon">⚠️</div><h3>Could not load logs</h3><p>' + e.message + '</p></div></td></tr>';
            }
        }

        function renderLogs() {
            const tbody = document.getElementById('log-body');
            let filtered = allLogs;
            if (currentFilter === 'success') filtered = allLogs.filter(l => l.status === 'success');
            if (currentFilter === 'error') filtered = allLogs.filter(l => l.status === 'error');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><h3>No logs yet</h3><p>ntfy.sh notifications will appear here</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(log => {
                const time = new Date(log.time).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'});
                const title = escHtml(log.title || 'Unknown');
                const url = log.url || '#';
                const price = log.price != null ? '$' + log.price.toFixed(2) : '—';
                const disc = log.discount || 0;
                const discClass = disc >= 50 ? 'hot' : disc > 0 ? 'good' : 'none';
                const statusClass = log.status === 'success' ? 'success' : 'error';
                const statusLabel = log.status === 'success' ? '✓ Sent' : '✕ Failed';
                const detail = log.error ? escHtml(log.error) : (log.status === 'success' ? 'Delivered' : '');

                return `<tr>
                    <td class="mono">${time}</td>
                    <td><a href="${url}" target="_blank" rel="noopener" class="deal-link">${title.length > 55 ? title.substring(0,55) + '…' : title}</a></td>
                    <td class="mono hide-mobile">${price}</td>
                    <td><span class="discount-badge ${discClass}">${disc}%</span></td>
                    <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                    <td class="hide-mobile ${log.error ? 'error-cell' : 'text-muted'}" title="${detail}">${detail}</td>
                </tr>`;
            }).join('');
        }

        function updateStats() {
            const total = allLogs.length;
            const ok = allLogs.filter(l => l.status === 'success').length;
            const fail = total - ok;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-ok').textContent = ok;
            document.getElementById('stat-fail').textContent = fail;
        }

        // Filter chips
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderLogs();
            });
        });

        // Clear logs
        document.getElementById('btn-clear').addEventListener('click', async () => {
            if (!confirm('Clear all ntfy.sh logs?')) return;
            try {
                await fetch('/api/ntfy-logs', { method: 'DELETE' });
                allLogs = [];
                renderLogs();
                updateStats();
            } catch (e) {}
        });

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        // Auto-refresh every 30s
        loadLogs();
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
