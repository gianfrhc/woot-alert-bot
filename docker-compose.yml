version: "3.8"

services:
  woot-bot:
    build: .
    container_name: woot-alert-bot
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      # Persist settings, auth, sessions, and logs across restarts
      - ./data/auth.json:/app/auth.json
      - ./data/settings.json:/app/settings.json
      - ./data/sessions.json:/app/sessions.json
      - ./data/ntfy-logs.json:/app/ntfy-logs.json
      - ./data/logs:/app/logs
    environment:
      - NODE_ENV=production
      - TZ=America/Lima
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
