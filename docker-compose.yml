

services:
  woot-bot:
    build: .
    container_name: woot-alert-bot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8081:8080"
    volumes:
      # Persist settings, auth, sessions, and logs across restarts
      - ./data/auth.json:/app/auth.json
      - ./data/settings.json:/app/settings.json
      - ./data/sessions.json:/app/sessions.json
      - ./data/ntfy-logs.json:/app/ntfy-logs.json
      - ./data/seen-ids.json:/app/seen-ids.json
      - ./data/favorites.json:/app/favorites.json
      - ./data/price-history.json:/app/price-history.json
      - ./data/logs:/app/logs
    environment:
      - NODE_ENV=production
      - TZ=America/Lima
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
